events {}
http {
  upstream api { server backend:8000; }
  upstream web { server frontend:3000; }
  server {
    listen 80;
    location /api/ { proxy_pass http://api/; proxy_set_header Host $host; }
    location /stream { proxy_pass http://api/stream; proxy_buffering off; proxy_set_header Connection ''; }
    location / { proxy_pass http://web; }
  }
}
